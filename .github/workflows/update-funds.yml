name: Fon Verilerini Güncelle

on:
  schedule:
    - cron: '30 7 * * *'  # Her gün 10:30 Türkiye saati (UTC+3)
  workflow_dispatch:       # Elle de çalıştırılabilir

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install aiohttp

      - name: main.py çalıştır
        run: python main.py

      - name: Değişiklikleri commit et ve push'la
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add funds_allocation.json
          git diff --cached --quiet || git commit -m "chore: fon dağılımları güncellendi ($(date -u '+%Y-%m-%d'))"
          git push
